document.addEventListener('DOMContentLoaded', async function() {
  const loading = document.getElementById('__bundler_loading');
  function setStatus(msg) { if (loading) loading.textContent = msg; }

  // Error sink persists across replaceWith since it's on window, not the DOM.
  window.addEventListener('error', function(e) {
    var p = document.body || document.documentElement;
    var d = document.getElementById('__bundler_err') || p.appendChild(document.createElement('div'));
    d.id = '__bundler_err';
    d.style.cssText = 'position:fixed;bottom:12px;left:12px;right:12px;font:12px/1.4 ui-monospace,monospace;background:#2a1215;color:#ff8a80;padding:10px 14px;border-radius:8px;border:1px solid #5c2b2e;z-index:99999;white-space:pre-wrap;max-height:40vh;overflow:auto';
    d.textContent = (d.textContent ? d.textContent + String.fromCharCode(10) : '') +
      '[bundle] ' + (e.message || e.type) +
      (e.filename ? ' (' + e.filename.slice(0, 60) + ':' + e.lineno + ')' : '');
  }, true);

  try {
    const manifestEl = document.querySelector('script[type="__bundler/manifest"]');
    const templateEl = document.querySelector('script[type="__bundler/template"]');
    if (!manifestEl || !templateEl) {
      setStatus('Error: missing bundle data');
      console.error('[bundler] Missing script tags — manifestEl:', !!manifestEl, 'templateEl:', !!templateEl);
      return;
    }

    const manifest = JSON.parse(manifestEl.textContent);
    let template = JSON.parse(templateEl.textContent);

    const uuids = Object.keys(manifest);
    setStatus('Unpacking ' + uuids.length + ' assets...');

    const blobUrls = {};
    await Promise.all(uuids.map(async (uuid) => {
      const entry = manifest[uuid];
      try {
        const binaryStr = atob(entry.data);
        const bytes = new Uint8Array(binaryStr.length);
        for (let i = 0; i < binaryStr.length; i++) bytes[i] = binaryStr.charCodeAt(i);

        let finalBytes = bytes;
        if (entry.compressed) {
          if (typeof DecompressionStream !== 'undefined') {
            const ds = new DecompressionStream('gzip');
            const writer = ds.writable.getWriter();
            const reader = ds.readable.getReader();
            writer.write(bytes);
            writer.close();
            const chunks = [];
            let totalLen = 0;
            while (true) {
              const { done, value } = await reader.read();
              if (done) break;
              chunks.push(value);
              totalLen += value.length;
            }
            finalBytes = new Uint8Array(totalLen);
            let offset = 0;
            for (const chunk of chunks) { finalBytes.set(chunk, offset); offset += chunk.length; }
          } else {
            console.warn('DecompressionStream not available, asset ' + uuid + ' may not render');
          }
        }

        blobUrls[uuid] = URL.createObjectURL(new Blob([finalBytes], { type: entry.mime }));
      } catch (err) {
        console.error('Failed to decode asset ' + uuid + ':', err);
        blobUrls[uuid] = URL.createObjectURL(new Blob([], { type: entry.mime }));
      }
    }));

    const extResEl = document.querySelector('script[type="__bundler/ext_resources"]');
    const extResources = extResEl ? JSON.parse(extResEl.textContent) : [];
    const resourceMap = {};
    for (const entry of extResources) {
      if (blobUrls[entry.uuid]) resourceMap[entry.id] = blobUrls[entry.uuid];
    }

    setStatus('Rendering...');
    for (const uuid of uuids) template = template.split(uuid).join(blobUrls[uuid]);

    // Strip integrity + crossorigin — blob URLs from a file:// document inherit
    // a null origin, so crossorigin forces a CORS fetch that SRI then rejects.
    // The manifest bytes are ours; SRI protects against CDN compromise, not this.
    template = template.replace(/\s+integrity="[^"]*"/gi, '').replace(/\s+crossorigin="[^"]*"/gi, '');

    const resourceScript = '<script>window.__resources = ' +
      JSON.stringify(resourceMap).split('</' + 'script>').join('<\\/' + 'script>') +
      ';</' + 'script>';
    // Inject after <head> so the DOCTYPE stays first; prepending the script
    // would push the parser into quirks mode. DOMParser always emits a <head>
    // (synthesizing one if the source HTML omitted it) but may carry
    // attributes through, so match the full opening tag. slice() rather than
    // replace() keeps us clear of $-pattern substitution in resourceScript.
    const headOpen = template.match(/<head[^>]*>/i);
    if (headOpen) {
      const i = headOpen.index + headOpen[0].length;
      template = template.slice(0, i) + resourceScript + template.slice(i);
    }

    // Parse the template and swap the root element. Scripts inserted via
    // DOMParser/replaceWith are inert per spec — re-create each with
    // createElement so they execute, awaiting onload for src scripts to
    // preserve ordering (React before ReactDOM before Babel before text/babel).
    const doc = new DOMParser().parseFromString(template, 'text/html');
    document.documentElement.replaceWith(doc.documentElement);
    const dead = Array.from(document.scripts);
    for (const old of dead) {
      const s = document.createElement('script');
      for (const a of old.attributes) s.setAttribute(a.name, a.value);
      s.textContent = old.textContent;
      // text/babel scripts with a src: fetch and inline. transformScriptTags
      // does XHR against the src, but blob:null/ from a file:// origin is
      // silently dropped. Inlining makes it a plain inline babel script,
      // which transformScriptTags handles unconditionally.
      if ((s.type === 'text/babel' || s.type === 'text/jsx') && s.src) {
        const r = await fetch(s.src);
        s.textContent = await r.text();
        s.removeAttribute('src');
      }
      const p = s.src ? new Promise(function(r) { s.onload = s.onerror = r; }) : null;
      old.replaceWith(s);
      if (p) await p;
    }
    // Babel standalone auto-transforms type=text/babel on DOMContentLoaded,
    // which fired before we swapped the document. Trigger manually if present.
    if (window.Babel && typeof window.Babel.transformScriptTags === 'function') {
      window.Babel.transformScriptTags();
    }
  } catch (err) {
    setStatus('Error unpacking: ' + err.message);
    console.error('Bundle unpack error:', err);
  }
});

135deg,#d6497d,#bd2c61);color:#fff;font-family:'Comfortaa';font-weight:600;font-size:19px;padding:18px 0;width:150px;border-radius:40px;box-shadow:0 12px 26px rgba(189,44,97,.4);transition:transform .15s\" style-hover=\"transform:translateY(-2px)\" style-active=\"transform:scale(.96)\">Да<\u002Fbutton>\n          <sc-if value=\"{{ noVisible }}\" hint-placeholder-val=\"{{ true }}\">\n            <button onmouseenter=\"{{ onNoTry }}\" onclick=\"{{ onNoTry }}\" style=\"border:none;cursor:pointer;background:#b7bbc3;color:#fff;font-family:'Comfortaa';font-weight:600;font-size:19px;padding:18px 0;width:150px;border-radius:40px;box-shadow:0 8px 18px rgba(120,120,130,.25);transition:transform .28s cubic-bezier(.34,1.56,.64,1);transform:translate({{ noX }}px,{{ noY }}px)\">Нет<\u002Fbutton>\n          <\u002Fsc-if>\n        <\u002Fdiv>\n        <sc-if value=\"{{ showTaunt }}\" hint-placeholder-val=\"{{ false }}\">\n          <div style=\"margin-top:18px;font-size:13px;color:#a98;font-weight:500;animation:scFadeUp .3s ease both\">{{ taunt }}<\u002Fdiv>\n        <\u002Fsc-if>\n      <\u002Fdiv>\n    <\u002Fsc-if>\n\n    <!-- Screen 2 — surprised -->\n    <sc-if value=\"{{ s2 }}\" hint-placeholder-val=\"{{ false }}\">\n      <div style=\"width:100%;display:flex;flex-direction:column;align-items:center;animation:scFadeUp .45s ease both\">\n        <div style=\"position:relative;font-size:96px;line-height:1;margin-bottom:30px;animation:scPop .5s ease both\">\n          😻\n          <span style=\"position:absolute;top:-6px;left:-8px;font-size:30px;animation:scFloat 3s ease-in-out infinite\">❤️<\u002Fspan>\n          <span style=\"position:absolute;top:2px;right:-10px;font-size:22px;animation:scFloat 3.4s ease-in-out .3s infinite\">💕<\u002Fspan>\n        <\u002Fdiv>\n        <h1 style=\"font-size:23px;font-weight:700;color:#2b2b2b;text-align:center;line-height:1.3;margin-bottom:12px;text-wrap:balance\">Подожди, ты действительно сказала да?<\u002Fh1>\n        <p style=\"font-size:14px;font-weight:400;color:#9a9a9a;text-align:center;margin-bottom:34px\">Я был готов что скажешь «нет» ахах<\u002Fp>\n        <button onclick=\"{{ onYes2 }}\" style=\"border:none;cursor:pointer;background:linear-gradient(135deg,#d6497d,#bd2c61);color:#fff;font-family:'Comfortaa';font-weight:700;font-size:20px;padding:18px 44px;border-radius:40px;box-shadow:0 12px 26px rgba(189,44,97,.4);transition:transform .15s;letter-spacing:.5px\" style-hover=\"transform:translateY(-2px)\" style-active=\"transform:scale(.96)\">Да Да ДА 🥰<\u002Fbutton>\n      <\u002Fdiv>\n    <\u002Fsc-if>\n\n    <!-- Screen 3 — when free -->\n    <sc-if value=\"{{ s3 }}\" hint-placeholder-val=\"{{ false }}\">\n      <div style=\"width:100%;display:flex;flex-direction:column;align-items:center;animation:scFadeUp .45s ease both\">\n        <div style=\"font-size:80px;line-height:1;margin-bottom:22px;animation:scFloat 3.6s ease-in-out infinite\">🥺<\u002Fdiv>\n        <h1 style=\"font-size:22px;font-weight:700;color:#2b2b2b;text-align:center;line-height:1.3;margin-bottom:28px\">И так… Когда ты свободна?<\u002Fh1>\n        <div style=\"width:100%;text-align:left;margin-bottom:14px\">\n          <label style=\"display:block;font-size:13px;color:#9a9a9a;margin:0 0 7px 6px\">Дата<\u002Flabel>\n          <input type=\"date\" value=\"{{ dateVal }}\" onchange=\"{{ onDate }}\" style=\"width:100%;border:1.5px solid #d8dcd6;background:#fff;border-radius:30px;padding:15px 20px;font-size:16px;color:#2b2b2b;outline:none\">\n        <\u002Fdiv>\n        <div style=\"width:100%;text-align:left;margin-bottom:26px\">\n          <label style=\"display:block;font-size:13px;color:#9a9a9a;margin:0 0 7px 6px\">Время<\u002Flabel>\n          <input type=\"time\" value=\"{{ timeVal }}\" onchange=\"{{ onTime }}\" style=\"width:100%;border:1.5px solid #d8dcd6;background:#fff;border-radius:30px;padding:15px 20px;font-size:16px;color:#2b2b2b;outline:none\">\n        <\u002Fdiv>\n        <button onclick=\"{{ onConfirm }}\" disabled=\"{{ confirmDisabled }}\" style=\"border:none;cursor:{{ confirmCursor }};background:{{ confirmBg }};color:#fff;font-family:'Comfortaa';font-weight:600;font-size:18px;padding:17px 0;width:100%;border-radius:40px;box-shadow:0 10px 22px rgba(189,44,97,.32);transition:transform .15s,opacity .2s;opacity:{{ confirmOpacity }}\" style-active=\"transform:scale(.98)\">{{ confirmLabel }}<\u002Fbutton>\n      <\u002Fdiv>\n    <\u002Fsc-if>\n\n    <!-- Screen 4 — glad -->\n    <sc-if value=\"{{ s4 }}\" hint-placeholder-val=\"{{ false }}\">\n      <div style=\"position:absolute;inset:0;pointer-events:none;overflow:hidden\">\n        <span style=\"position:absolute;top:8%;left:12%;font-size:34px;opacity:.5;animation:scHeart 4s ease-in-out infinite\">🩷<\u002Fspan>\n        <span style=\"position:absolute;top:16%;right:10%;font-size:26px;opacity:.45;animation:scHeart 4.6s ease-in-out .4s infinite\">🩷<\u002Fspan>\n        <span style=\"position:absolute;top:42%;left:6%;font-size:40px;opacity:.4;animation:scHeart 5.2s ease-in-out .8s infinite\">🩷<\u002Fspan>\n        <span style=\"position:absolute;bottom:18%;right:8%;font-size:32px;opacity:.5;animation:scHeart 4.2s ease-in-out .2s infinite\">🩷<\u002Fspan>\n        <span style=\"position:absolute;bottom:10%;left:16%;font-size:24px;opacity:.4;animation:scHeart 4.8s ease-in-out .6s infinite\">🩷<\u002Fspan>\n        <span style=\"position:absolute;top:30%;right:30%;font-size:20px;opacity:.35;animation:scHeart 5s ease-in-out 1s infinite\">🩷<\u002Fspan>\n      <\u002Fdiv>\n      <div style=\"position:relative;width:100%;display:flex;flex-direction:column;align-items:center;animation:scFadeUp .45s ease both\">\n        <div style=\"font-size:84px;line-height:1;margin-bottom:24px;animation:scPop .5s ease both\">🍱<\u002Fdiv>\n        <h1 style=\"font-size:23px;font-weight:700;color:#c2306a;text-align:center;line-height:1.3;margin-bottom:16px\">Рад тому, что не отказалась 💗<\u002Fh1>\n        <p style=\"font-size:16px;font-weight:400;color:#5f5f5f;text-align:center;line-height:1.5;margin-bottom:32px;text-wrap:balance\">Будь готова к <b style=\"color:#2b2b2b\">{{ formattedDate }}<\u002Fb> в <b style=\"color:#2b2b2b\">{{ timeVal }}<\u002Fb>, я приеду за тобой 🚗<\u002Fp>\n        <button onclick=\"{{ onNext4 }}\" style=\"border:none;cursor:pointer;background:linear-gradient(135deg,#d6497d,#bd2c61);color:#fff;font-family:'Comfortaa';font-weight:600;font-size:18px;padding:17px 44px;border-radius:40px;box-shadow:0 12px 26px rgba(189,44,97,.4);transition:transform .15s\" style-hover=\"transform:translateY(-2px)\" style-active=\"transform:scale(.96)\">Дальше 🍽️<\u002Fbutton>\n      <\u002Fdiv>\n    <\u002Fsc-if>\n\n    <!-- Screen 5 — food -->\n    <sc-if value=\"{{ s5 }}\" hint-placeholder-val=\"{{ false }}\">\n      <div style=\"width:100%;display:flex;flex-direction:column;align-items:center;animation:scFadeUp .45s ease both\">\n        <h1 style=\"font-size:24px;font-weight:700;color:#2b2b2b;text-align:center;margin-bottom:6px\">Что ты хочешь?<\u002Fh1>\n        <p style=\"font-size:14px;font-weight:400;color:#9a9a9a;text-align:center;margin-bottom:24px\">Выбери, что тебе в кайф<\u002Fp>\n        <div style=\"display:grid;grid-template-columns:1fr 1fr;gap:14px;width:100%\">\n          <sc-for list=\"{{ foods }}\" as=\"f\" hint-placeholder-count=\"6\">\n            <button onclick=\"{{ f.pick }}\" style=\"border:1.5px solid #e4d3da;background:#fff;border-radius:22px;padding:18px 8px 14px;cursor:pointer;display:flex;flex-direction:column;align-items:center;gap:10px;transition:transform .15s,border-color .15s,box-shadow .15s\" style-hover=\"transform:translateY(-3px);border-color:#d6497d;box-shadow:0 10px 22px rgba(189,44,97,.18)\" style-active=\"transform:scale(.96)\">\n              <span style=\"font-size:42px;line-height:1\">{{ f.emoji }}<\u002Fspan>\n              <span style=\"font-size:15px;font-weight:600;color:#3a3a3a;font-family:'Comfortaa'\">{{ f.label }}<\u002Fspan>\n            <\u002Fbutton>\n          <\u002Fsc-for>\n        <\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fsc-if>\n\n    <!-- Screen 6 — final -->\n    <sc-if value=\"{{ s6 }}\" hint-placeholder-val=\"{{ false }}\">\n      <div style=\"position:absolute;inset:0;pointer-events:none;overflow:hidden\">\n        <span style=\"position:absolute;top:10%;left:14%;font-size:30px;opacity:.5;animation:scHeart 4s ease-in-out infinite\">💖<\u002Fspan>\n        <span style=\"position:absolute;top:20%;right:12%;font-size:24px;opacity:.45;animation:scHeart 4.6s ease-in-out .4s infinite\">✨<\u002Fspan>\n        <span style=\"position:absolute;bottom:16%;left:10%;font-size:28px;opacity:.45;animation:scHeart 5s ease-in-out .8s infinite\">💖<\u002Fspan>\n        <span style=\"position:absolute;bottom:24%;right:14%;font-size:22px;opacity:.4;animation:scHeart 4.4s ease-in-out .2s infinite\">✨<\u002Fspan>\n      <\u002Fdiv>\n      <div style=\"position:relative;width:100%;display:flex;flex-direction:column;align-items:center;animation:scFadeUp .45s ease both\">\n        <div style=\"font-size:88px;line-height:1;margin-bottom:22px;animation:scPop .5s ease both\">{{ foodEmoji }}<\u002Fdiv>\n        <h1 style=\"font-size:25px;font-weight:700;color:#c2306a;text-align:center;margin-bottom:18px\">Свидание назначено! 💞<\u002Fh1>\n        <div style=\"width:100%;background:#fff;border-radius:24px;padding:20px 22px;box-shadow:inset 0 0 0 1.5px #efe1e6;margin-bottom:26px\">\n          <div style=\"display:flex;justify-content:space-between;align-items:center;padding:8px 0;border-bottom:1px solid #f1eaed\"><span style=\"color:#9a9a9a;font-size:14px\">📅 Дата<\u002Fspan><span style=\"color:#2b2b2b;font-weight:600;font-size:15px\">{{ formattedDate }}<\u002Fspan><\u002Fdiv>\n          <div style=\"display:flex;justify-content:space-between;align-items:center;padding:8px 0;border-bottom:1px solid #f1eaed\"><span style=\"color:#9a9a9a;font-size:14px\">⏰ Время<\u002Fspan><span style=\"color:#2b2b2b;font-weight:600;font-size:15px\">{{ timeVal }}<\u002Fspan><\u002Fdiv>\n          <div style=\"display:flex;justify-content:space-between;align-items:center;padding:8px 0\"><span style=\"color:#9a9a9a;font-size:14px\">🍴 Еда<\u002Fspan><span style=\"color:#2b2b2b;font-weight:600;font-size:15px\">{{ foodEmoji }} {{ foodLabel }}<\u002Fspan><\u002Fdiv>\n        <\u002Fdiv>\n        <p style=\"font-size:15px;color:#5f5f5f;text-align:center;line-height:1.5;margin-bottom:22px\">До встречи, я заеду за тобой 🚗💨<\u002Fp>\n        <button onclick=\"{{ onContract }}\" style=\"border:none;cursor:pointer;background:linear-gradient(135deg,#d6497d,#bd2c61);color:#fff;font-family:'Comfortaa';font-weight:600;font-size:17px;padding:16px 36px;border-radius:40px;box-shadow:0 12px 26px rgba(189,44,97,.4);transition:transform .15s;margin-bottom:12px\" style-hover=\"transform:translateY(-2px)\" style-active=\"transform:scale(.96)\">Скрепить договор 📜<\u002Fbutton>\n        <button onclick=\"{{ onRestart }}\" style=\"border:none;cursor:pointer;background:transparent;color:#bd2c61;font-family:'Comfortaa';font-weight:600;font-size:13px;padding:6px;text-decoration:underline\">↺ С начала<\u002Fbutton>\n      <\u002Fdiv>\n    <\u002Fsc-if>\n\n    <!-- Screen 7 — contract + countdown -->\n    <sc-if value=\"{{ s7 }}\" hint-placeholder-val=\"{{ false }}\">\n      <div style=\"position:absolute;inset:0;pointer-events:none;overflow:hidden\">\n        <span style=\"position:absolute;top:9%;left:11%;font-size:26px;opacity:.45;animation:scHeart 4s ease-in-out infinite\">💘<\u002Fspan>\n        <span style=\"position:absolute;top:22%;right:10%;font-size:20px;opacity:.4;animation:scHeart 4.6s ease-in-out .4s infinite\">💝<\u002Fspan>\n        <span style=\"position:absolute;bottom:14%;left:9%;font-size:24px;opacity:.4;animation:scHeart 5s ease-in-out .8s infinite\">💘<\u002Fspan>\n        <span style=\"position:absolute;bottom:26%;right:12%;font-size:18px;opacity:.4;animation:scHeart 4.4s ease-in-out .2s infinite\">💝<\u002Fspan>\n      <\u002Fdiv>\n      <div style=\"position:relative;width:100%;display:flex;flex-direction:column;align-items:center;animation:scFadeUp .45s ease both\">\n        <div style=\"position:relative;width:100%;background:#fffdf7;border:2px dashed #d8c6cc;border-radius:18px;padding:22px 18px 18px;margin-bottom:22px;box-shadow:0 8px 22px rgba(120,90,100,.12)\">\n          <div style=\"font-size:11px;letter-spacing:2px;color:#b0a0a6;text-align:center;font-weight:600;margin-bottom:6px\">ОФИЦИАЛЬНЫЙ ДОГОВОР №14❤️<\u002Fdiv>\n          <h2 style=\"font-size:18px;font-weight:700;color:#2b2b2b;text-align:center;line-height:1.3;margin-bottom:12px\">О проведении самого лучшего свидания<\u002Fh2>\n          <div style=\"font-size:13px;color:#5f5f5f;line-height:1.7;text-align:left;padding:0 4px\">\n            <div>§1. Сторона №1 обязуется приехать вовремя 🚗<\u002Fdiv>\n            <div>§2. Сторона №2 обязуется быть неотразимой 💅<\u002Fdiv>\n            <div>§3. Хорошее настроение — обязательно 😄<\u002Fdiv>\n            <div>§4. Расторжению договор <b>НЕ подлежит<\u002Fb> 🔒<\u002Fdiv>\n          <\u002Fdiv>\n          <div style=\"position:absolute;right:14px;bottom:10px;border:3px solid #c2306a;color:#c2306a;font-weight:700;font-size:14px;padding:6px 12px;border-radius:8px;letter-spacing:1px;animation:scStamp .7s ease both .25s\">СОГЛАСОВАНО<\u002Fdiv>\n        <\u002Fdiv>\n        <div style=\"font-size:13px;color:#9a9a9a;font-weight:500;margin-bottom:10px\">⏳ До нашего свидания осталось<\u002Fdiv>\n        <div style=\"font-size:24px;font-weight:700;color:#c2306a;text-align:center;margin-bottom:18px;animation:scShake 3.5s ease-in-out infinite\">{{ countdown }}<\u002Fdiv>\n        <button onclick=\"{{ onSendTelegram }}\" style=\"border:none;cursor:pointer;background:linear-gradient(135deg,#3aa8e8,#2592d8);color:#fff;font-family:'Comfortaa';font-weight:600;font-size:17px;padding:15px 30px;border-radius:40px;box-shadow:0 12px 26px rgba(37,146,216,.4);transition:transform .15s;display:inline-flex;align-items:center;gap:9px;margin-bottom:10px\" style-hover=\"transform:translateY(-2px)\" style-active=\"transform:scale(.96)\"><span style=\"font-size:20px\">✈️<\u002Fspan> Отправить ответ в Telegram<\u002Fbutton>\n        <sc-if value=\"{{ sent }}\" hint-placeholder-val=\"{{ false }}\">\n          <div style=\"font-size:13px;color:#2592d8;font-weight:600;text-align:center;line-height:1.5;margin-bottom:8px;animation:scFadeUp .3s ease both;max-width:300px\">Ответ скопирован 📋 Вставь его в чат с @suryapin1 (Ctrl/⌘+V) и нажми «Отправить» 💌<\u002Fdiv>\n        <\u002Fsc-if>\n        <div style=\"position:relative;display:flex;justify-content:center;width:100%;min-height:48px\">\n          <button onmouseenter=\"{{ onCancelTry }}\" onclick=\"{{ onCancelTry }}\" style=\"border:1.5px solid #cfd2d8;background:#fff;color:#9a9aa2;font-family:'Comfortaa';font-weight:600;font-size:14px;padding:11px 26px;border-radius:30px;cursor:pointer;transition:transform .28s cubic-bezier(.34,1.56,.64,1);transform:translate({{ cancelX }}px,{{ cancelY }}px)\">Отменить ❌<\u002Fbutton>\n        <\u002Fdiv>\n        <sc-if value=\"{{ showCancelTaunt }}\" hint-placeholder-val=\"{{ false }}\">\n          <div style=\"margin-top:14px;font-size:13px;color:#bd2c61;font-weight:600;text-align:center;animation:scFadeUp .3s ease both\">{{ cancelTaunt }}<\u002Fdiv>\n        <\u002Fsc-if>\n        <button onclick=\"{{ onRestart }}\" style=\"border:none;cursor:pointer;background:transparent;color:#bd2c61;font-family:'Comfortaa';font-weight:600;font-size:13px;padding:14px 6px 0;text-decoration:underline\">↺ С начала<\u002Fbutton>\n      <\u002Fdiv>\n    <\u002Fsc-if>\n\n  <\u002Fdiv>\n<\u002Fdiv>\n<\u002Fx-dc>\n<script type=\"text/x-dc\" data-dc-script=\"\" data-props=\"{&quot;$preview&quot;:{&quot;width&quot;:480,&quot;height&quot;:620},&quot;girlName&quot;:{&quot;editor&quot;:&quot;text&quot;,&quot;default&quot;:&quot;&quot;,&quot;tsType&quot;:&quot;string&quot;,&quot;section&quot;:&quot;Текст&quot;},&quot;runawayNo&quot;:{&quot;editor&quot;:&quot;boolean&quot;,&quot;default&quot;:true,&quot;tsType&quot;:&quot;boolean&quot;,&quot;section&quot;:&quot;Поведение&quot;}}\">\nclass Component extends DCLogic {\n  state = { screen: 1, noX: 0, noY: 0, noTries: 0, noHidden: false, date: '', time: '', food: null, taunt: '', now: Date.now(), cancelX: 0, cancelY: 0, cancelTries: 0, cancelTaunt: '' };\n\n  taunts = ['Не туда 😏', 'Попробуй ещё 😼', 'Кнопка стесняется 🙈', 'Не выйдет 🙃', 'Серьёзно?? 😹', 'Сдавайся, скажи Да 💗'];\n  cancelTaunts = ['Договор не подлежит расторжению 🔒', 'Поздно, уже подписано 😼', 'А вот и нет 😏', 'Кнопка не работает специально 🙃', 'Свидание неизбежно 💞'];\n\n  componentDidMount() {\n    this._t = setInterval(() => this.setState({ now: Date.now() }), 1000);\n  }\n  componentWillUnmount() {\n    if (this._t) clearInterval(this._t);\n  }\n\n  sendTelegram = (msg) => {\n    try {\n      if (navigator.clipboard) navigator.clipboard.writeText(msg).catch(() => {});\n    } catch (e) {}\n    window.open('https://t.me/suryapin1', '_blank');\n    this.setState({ sent: true });\n  };\n\n  cancelTry = () => {\n    const rx = Math.round((Math.random() * 2 - 1) * 120);\n    const ry = Math.round((Math.random() * 2 - 1) * 90);\n    const t = this.state.cancelTries;\n    this.setState({ cancelX: rx, cancelY: ry, cancelTries: t + 1, cancelTaunt: this.cancelTaunts[t % this.cancelTaunts.length] });\n  };\n\n  tryNo = () => {\n    if (this.props.runawayNo === false) {\n      this.setState({ noHidden: true });\n      return;\n    }\n    const rx = Math.round((Math.random() * 2 - 1) * 130);\n    const ry = Math.round((Math.random() * 2 - 1) * 150);\n    const t = this.state.noTries;\n    this.setState({ noX: rx, noY: ry, noTries: t + 1, taunt: this.taunts[t % this.taunts.length] });\n  };\n\n  selectFood = (f) => this.setState({ food: f, screen: 6 });\n\n  renderVals() {\n    const s = this.state;\n    const name = (this.props.girlName || '').trim();\n    const title1 = name ? name + ', ты пойдешь со мной на свидание?' : 'Ты пойдешь со мной на свидание?';\n\n    const foodsBase = [\n      { key: 'pizza', emoji: '🍕', label: 'Пицца' },\n      { key: 'sushi', emoji: '🍱', label: 'Суши' },\n      { key: 'burger', emoji: '🍔', label: 'Бургер' },\n      { key: 'pasta', emoji: '🍝', label: 'Паста' },\n      { key: 'rolton', emoji: '🥣', label: 'Ролтон' },\n      { key: 'meat', emoji: '🥩', label: 'Мясо' },\n    ];\n    const foods = foodsBase.map(f => ({ ...f, pick: () => this.selectFood(f) }));\n\n    let formattedDate = s.date;\n    if (s.date && /^\\d{4}-\\d{2}-\\d{2}$/.test(s.date)) {\n      const [y, m, d] = s.date.split('-');\n      formattedDate = d + '.' + m + '.' + y;\n    }\n\n    const confirmDisabled = !(s.date && s.time);\n    const confirmLabel = confirmDisabled ? 'Выбери дату и время ♥' : 'Подтвердить ♥';\n\n    // live countdown to the date\n    let countdown = '…';\n    if (s.date && s.time) {\n      const target = new Date(s.date + 'T' + s.time).getTime();\n      let diff = Math.floor((target - s.now) / 1000);\n      if (isNaN(target)) {\n        countdown = '…';\n      } else if (diff <= 0) {\n        countdown = 'Уже пора! 🚗💨';\n      } else {\n        const d = Math.floor(diff / 86400); diff -= d * 86400;\n        const h = Math.floor(diff / 3600); diff -= h * 3600;\n        const m = Math.floor(diff / 60); const sec = diff - m * 60;\n        const pad = (n) => String(n).padStart(2, '0');\n        countdown = (d > 0 ? d + 'д ' : '') + pad(h) + ':' + pad(m) + ':' + pad(sec);\n      }\n    }\n\n    return {\n      s1: s.screen === 1, s2: s.screen === 2, s3: s.screen === 3,\n      s4: s.screen === 4, s5: s.screen === 5, s6: s.screen === 6, s7: s.screen === 7,\n      title1,\n      noVisible: !s.noHidden,\n      noX: s.noX, noY: s.noY,\n      showTaunt: s.noTries > 0 && !s.noHidden,\n      taunt: s.taunt,\n      onYes1: () => this.setState({ screen: 2 }),\n      onNoTry: this.tryNo,\n      onYes2: () => this.setState({ screen: 3 }),\n      dateVal: s.date, timeVal: s.time,\n      onDate: (e) => this.setState({ date: e.target.value }),\n      onTime: (e) => this.setState({ time: e.target.value }),\n      confirmDisabled,\n      confirmLabel,\n      confirmBg: confirmDisabled ? '#cfb7c2' : 'linear-gradient(135deg,#d6497d,#bd2c61)',\n      confirmCursor: confirmDisabled ? 'not-allowed' : 'pointer',\n      confirmOpacity: confirmDisabled ? 0.7 : 1,\n      onConfirm: () => { if (!confirmDisabled) this.setState({ screen: 4 }); },\n      formattedDate,\n      onNext4: () => this.setState({ screen: 5 }),\n      foods,\n      foodEmoji: s.food ? s.food.emoji : '',\n      foodLabel: s.food ? s.food.label : '',\n      countdown,\n      tgMessage: 'Привет! Я согласна на свидание 💖\\n📅 Когда: ' + formattedDate + ' в ' + s.time + '\\n🍴 Хочу: ' + (s.food ? s.food.emoji + ' ' + s.food.label : '') + '\\nЖду, что заедешь за мной 🚗',\n      onSendTelegram: () => this.sendTelegram('Привет! Я согласна на свидание 💖\\n📅 Когда: ' + formattedDate + ' в ' + s.time + '\\n🍴 Хочу: ' + (s.food ? s.food.emoji + ' ' + s.food.label : '') + '\\nЖду, что заедешь за мной 🚗'),\n      sent: s.sent,\n      onContract: () => this.setState({ screen: 7 }),\n      cancelX: s.cancelX, cancelY: s.cancelY,\n      onCancelTry: this.cancelTry,\n      showCancelTaunt: s.cancelTries > 0,\n      cancelTaunt: s.cancelTaunt,\n      onRestart: () => this.setState({ screen: 1, noX: 0, noY: 0, noTries: 0, noHidden: false, date: '', time: '', food: null, taunt: '', cancelX: 0, cancelY: 0, cancelTries: 0, cancelTaunt: '', sent: false }),\n    };\n  }\n}\n<\u002Fscript>\n\n\n<\u002Fbody><\u002Fhtml>"
  </script>
